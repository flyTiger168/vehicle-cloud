server:
  port: 8081

spring:
  application:
    name: user-service

  # ---- H2 内存数据库 ----
  datasource:
    url: jdbc:h2:mem:userdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ---- JPA / Hibernate ----
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  # ---- SQL 初始化 ----
  sql:
    init:
      mode: always

  # ---- H2 Console（浏览器访问 /h2-console）----
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.wenjie.cloud: DEBUG
